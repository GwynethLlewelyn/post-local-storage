# Automatically publish a ZIP file as a release when a tag is pushed
# (gwyneth 20250308)
name: Publish Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  releases: write

jobs:
  create-zip:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions@github.com"

    - name: Create ZIP file
      run: |
        git archive -9 -o postlocalstorage.zip HEAD gwynethllewelyn/**

    - name: List files in the workspace
      run: |
        ls -al

    - name: Upload ZIP file as artifact
      uses: actions/upload-artifact@v7
      with:
        name: postlocalstorage
        path: postlocalstorage.zip
        overwrite: true
        compression-level: 0  # no need to compress an existing ZIP file

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: postlocalstorage.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}